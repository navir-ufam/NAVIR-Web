sonar.projectKey=navir-ufam
sonar.organization=NAVIR
sonar.projectName=NAVIR-Web

sonar.sources=src/backend/src,src/frontend/src

sonar.tests=src/backend/test,src/backend/src,src/frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx,**/*.spec.tsx

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.js,\
  **/coverage/**,\
  **/public/**

sonar.typescript.lcov.reportPaths=\
  src/backend/coverage/lcov.info,\
  src/frontend/coverage/lcov.info

sonar.typescript.tsconfigPaths=\
  src/backend/tsconfig.json,\
  src/frontend/tsconfig.json